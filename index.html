<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Три в ряд</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Основной контейнер: центрирует всё на странице -->
  <main class="page">
    <h1 class="title">ТРИ В РЯД</h1>

    <!-- Панель счёта (позже можно обновлять через JS) -->
    <p class="score">Счёт: 0</p>

    <!-- Игровое поле 6×6: сетка из клеток -->
    <div class="board" role="grid" aria-label="Игровое поле 6 на 6">
      <!-- Ряд 0 -->
      <div class="cell cell-1" data-row="0" data-col="0"></div>
      <div class="cell cell-2" data-row="0" data-col="1"></div>
      <div class="cell cell-3" data-row="0" data-col="2"></div>
      <div class="cell cell-1" data-row="0" data-col="3"></div>
      <div class="cell cell-2" data-row="0" data-col="4"></div>
      <div class="cell cell-3" data-row="0" data-col="5"></div>

      <!-- Ряд 1 -->
      <div class="cell cell-2" data-row="1" data-col="0"></div>
      <div class="cell cell-3" data-row="1" data-col="1"></div>
      <div class="cell cell-1" data-row="1" data-col="2"></div>
      <div class="cell cell-2" data-row="1" data-col="3"></div>
      <div class="cell cell-3" data-row="1" data-col="4"></div>
      <div class="cell cell-1" data-row="1" data-col="5"></div>

      <!-- Ряд 2 -->
      <div class="cell cell-3" data-row="2" data-col="0"></div>
      <div class="cell cell-1" data-row="2" data-col="1"></div>
      <div class="cell cell-2" data-row="2" data-col="2"></div>
      <div class="cell cell-3" data-row="2" data-col="3"></div>
      <div class="cell cell-1" data-row="2" data-col="4"></div>
      <div class="cell cell-2" data-row="2" data-col="5"></div>

      <!-- Ряд 3 -->
      <div class="cell cell-1" data-row="3" data-col="0"></div>
      <div class="cell cell-2" data-row="3" data-col="1"></div>
      <div class="cell cell-3" data-row="3" data-col="2"></div>
      <div class="cell cell-1" data-row="3" data-col="3"></div>
      <div class="cell cell-2" data-row="3" data-col="4"></div>
      <div class="cell cell-3" data-row="3" data-col="5"></div>

      <!-- Ряд 4 -->
      <div class="cell cell-2" data-row="4" data-col="0"></div>
      <div class="cell cell-3" data-row="4" data-col="1"></div>
      <div class="cell cell-1" data-row="4" data-col="2"></div>
      <div class="cell cell-2" data-row="4" data-col="3"></div>
      <div class="cell cell-3" data-row="4" data-col="4"></div>
      <div class="cell cell-1" data-row="4" data-col="5"></div>

      <!-- Ряд 5 -->
      <div class="cell cell-3" data-row="5" data-col="0"></div>
      <div class="cell cell-1" data-row="5" data-col="1"></div>
      <div class="cell cell-2" data-row="5" data-col="2"></div>
      <div class="cell cell-3" data-row="5" data-col="3"></div>
      <div class="cell cell-1" data-row="5" data-col="4"></div>
      <div class="cell cell-2" data-row="5" data-col="5"></div>
    </div>

    <!-- Подсказка для игрока -->
    <p class="hint">
      Кликните на фишку, затем на соседнюю чтобы поменять их местами
    </p>
  </main>
  <script src="game.js"></script>
</body>
</html>
